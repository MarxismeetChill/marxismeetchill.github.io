# Site Configuration

# Theme, mapped to the directory: ./theme/xxxx
theme: default

# HTML Language setting
lang: "en"

# Plugins, implemented in ./plugins/PLUGIN_NAME
# Use {{ vars.PLUGIN_NAME }} in the settings below

# The output of the plugin can be used below, e.g., {{vars.GithubRepoStarsCountPlugin}}
plugins:
  # Automatically fetch Github repo star count
  - GithubRepoStarsCountPlugin:
      - ZhgChgLi/ZMarkupParser
      - ZhgChgLi/ZReviewTender
      - ZhgChgLi/ZMediumToMarkdown
      - ZhgChgLi/linkyee

# Google Analytics tracking id
google_analytics_id:

# HTML Title
title: "Marxisme et Chill"

# Avatar image path
avatar: "./images/profile.jpeg"

# Name section text
name: "@Marxisme_Chill"

# Tagline section text
tagline: >-
  Accédez au podcast sur toutes les plateformes en un clic.

# List of links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# text: The displayed text for the link
# title: The url title
# url: The URL of the link
# alt: Alternative text for accessibility
# target: `_blank` opens in a new tab, `_self` opens in the same frame
links:
  - link:
      icon: "fa-brands fa-medium"
      text: "Youtube <span class='link-button-text'></span>"
      url: "https://www.youtube.com/@Marxismeetchill"
      alt: "Youtube"
      title: "Chaîne Youtube"
      target: "_blank"
  - link:
      icon: "fa-brands fa-medium"
      text: "Spotify <span class='link-button-text'></span>"
      url: "https://open.spotify.com/show/1yj5eWPqP5wGgGtOgCOItR"
      alt: "Spotify"
      title: "Spotify"
      target: "_blank"
  - link:
      icon: "fa-brands fa-medium"
      text: "Deezer <span class='link-button-text'></span>"
      url: "https://www.deezer.com/fr/show/1002814091"
      alt: "Deezer"
      title: "Deezer"
      target: "_blank"
  - link:
      icon: "fa-brands fa-twitter"
      text: "X"
      url: "https://x.com/Marxisme_Chill"
      alt: "X Marxisme et Chill"
      title: "X Marxisme et Chill"
      target: "_blank"


# List of social media links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# title: The url title
# url: The URL of the social media link
# alt: Alternative text for accessibility
# target: _blank opens in a new tab, _self opens in the same frame
socials:
  - social:
      icon: "fa-brands fa-twitter"
      url: "https://x.com/Marxisme_Chill"
      title: "X Marxisme et Chill"
      alt: "X Marxisme et Chill"
      target: "_blank"
  - social:
      icon: "fa-solid fa-envelope"
      url: "mailto:marxismeetchill@gmail.com"
      title: "Email: marxismeetchill@gmail.com"
      alt: "marxismeetchill@gmail.com"
      target: "_blank"

# Footer text
footer: >
    Bonjour ! Suivez-nous sur youtube, Spotify, Deezer ou sur X !

# Footer copyright message
# Linkyee is a 100% free, open-source project—feel free to modify the copyright message as you like. :)
copyright: >
  © 2024  <a href="https://link.zhgchg.li" target="_blank">ZhgChgLi</a>. Powered by <a href="https://github.com/ZhgChgLi/linkyee" target="_blank">linkyee</a>
